<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UIDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=author@700,800&f[]=switzer@400,500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="popup">

    <div class="setup-view hidden" id="setupView"></div>

    <div class="main-view" id="mainView">

    <div class="header">
      <div class="logo-wrap">
        <img src="icons/icon128.png" class="brand-logo" alt="UIDrop" />
      </div>

      <div class="wordmark">UI<span>Drop</span></div>

      <div class="header-badge hidden" id="statusBadge">
        <span class="badge-text"></span>
      </div>
    </div>

    <div class="screenshot" id="screenshotArea">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>snap to capture</span>
    </div>

    <p class="drag-hint hidden" id="dragHint">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11V4a1 1 0 011-1h0a1 1 0 011 1v7"/>
        <path d="M11 11V2a1 1 0 011-1h0a1 1 0 011 1v9"/>
        <path d="M13 11V3a1 1 0 011-1h0a1 1 0 011 1v8"/>
        <path d="M15 11V5a1 1 0 011-1h0a1 1 0 011 1v9.5a6 6 0 01-6 6h-2a6 6 0 01-5.196-3l-2-3.464A1 1 0 012 13a2 2 0 012-2h2"/>
      </svg>
      Drag the screenshot above into Claude, Cursor, or any AI chat
    </p>

    <button class="snap-btn" id="snapBtn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="4" width="14" height="13" rx="2" stroke="white" stroke-width="1.6"/>
        <path d="M7 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="7.5" cy="11" r="1.4" fill="white"/>
        <circle cx="10"  cy="11" r="1.4" fill="white" opacity="0.7"/>
        <circle cx="12.5" cy="11" r="1.4" fill="white" opacity="0.4"/>
      </svg>
      Snap this page
    </button>

    <div class="schema hidden" id="schemaBox">
      <div class="schema-head">
        <span class="schema-site" id="schemaSite"></span>
        <div class="schema-meta">
          <span class="schema-vibe" id="schemaVibe"></span>
          <span class="schema-mode" id="schemaMode"></span>
        </div>
      </div>
      <div class="schema-body" id="schemaBody"></div>
    </div>

    <div class="send-header">
      <span class="send-label">Send to</span>
      <div class="format-toggle" id="formatToggle" role="tablist" aria-label="Output format">
        <button class="fmt-opt fmt-active" data-mode="brief" role="tab" aria-selected="true">Prompt</button>
        <button class="fmt-opt" data-mode="skill" role="tab" aria-selected="false">system.md</button>
      </div>
    </div>
    <div class="send-grid">

      <button class="send-btn btn-claude" id="btnClaude">
        <div class="btn-icon-wrap">
          <img src="icons/claude-logo-64.png" alt="Claude" class="btn-logo" />
        </div>
        Claude
      </button>

      <button class="send-btn btn-chatgpt" id="btnChatGPT">
        <div class="btn-icon-wrap btn-icon-gpt">
          <svg viewBox="0 0 41 41" width="22" height="22" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M37.532 16.87a9.963 9.963 0 00-.856-8.184 10.078 10.078 0 00-10.855-4.835 9.964 9.964 0 00-7.505-3.348 10.079 10.079 0 00-9.61 6.977 9.967 9.967 0 00-6.664 4.834 10.08 10.08 0 001.24 11.817 9.965 9.965 0 00.856 8.185 10.079 10.079 0 0010.855 4.835 9.965 9.965 0 007.504 3.347 10.078 10.078 0 009.617-6.981 9.967 9.967 0 006.663-4.834 10.079 10.079 0 00-1.245-11.813zM22.498 37.886a7.474 7.474 0 01-4.799-1.735c.061-.033.168-.091.237-.134l7.964-4.6a1.294 1.294 0 00.655-1.134V19.054l3.366 1.944a.12.12 0 01.066.092v9.299a7.505 7.505 0 01-7.49 7.496zM6.392 31.006a7.471 7.471 0 01-.894-5.023c.06.036.162.099.237.141l7.964 4.6a1.297 1.297 0 001.308 0l9.724-5.614v3.888a.12.12 0 01-.048.103l-8.051 4.649a7.504 7.504 0 01-10.24-2.744zM4.297 13.62A7.469 7.469 0 018.2 10.333c0 .068-.004.19-.004.274v9.201a1.294 1.294 0 00.654 1.132l9.723 5.614-3.366 1.944a.12.12 0 01-.114.012L7.044 23.86a7.504 7.504 0 01-2.747-10.24zm27.658 6.437l-9.724-5.615 3.367-1.943a.121.121 0 01.114-.012l8.048 4.648a7.498 7.498 0 01-1.158 13.528v-9.476a1.293 1.293 0 00-.647-1.13zm3.35-5.043c-.059-.037-.162-.099-.236-.141l-7.965-4.6a1.298 1.298 0 00-1.308 0l-9.723 5.614v-3.888a.12.12 0 01.048-.103l8.05-4.645a7.497 7.497 0 0111.135 7.763zm-21.063 6.929l-3.367-1.944a.12.12 0 01-.065-.092v-9.299a7.497 7.497 0 0112.293-5.756 6.94 6.94 0 00-.236.134l-7.965 4.6a1.294 1.294 0 00-.654 1.132l-.006 11.225zm1.829-3.943l4.33-2.501 4.332 2.5v4.999l-4.331 2.5-4.331-2.5V18z"/>
          </svg>
        </div>
        GPT
      </button>

      <button class="send-btn btn-lovable" id="btnLovable">
        <div class="btn-icon-wrap btn-icon-lovable">
          <img src="icons/lovable-color.png" alt="Lovable" class="btn-logo" />
        </div>
        Lovable
      </button>

      <button class="send-btn btn-manus" id="btnManus">
        <div class="btn-icon-wrap btn-icon-manus">
          <img src="icons/manus.png" alt="Manus" class="btn-logo" />
        </div>
        Manus
      </button>

    </div><!-- /send-grid -->

    <div class="copy-row">
      <button class="copy-btn btn-cursor" id="btnCursor">
        <div class="btn-icon-wrap btn-icon-dark" style="width:22px;height:22px;border-radius:5px;">
          <img src="icons/cursor-logo-64.png" alt="Cursor" class="btn-logo" style="width:16px;height:16px;" />
        </div>
        Copy for Cursor
      </button>
      <button class="copy-btn" id="btnCopy">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="5" y="5" width="8" height="8" rx="1.5"/>
          <path d="M3 11V3h8"/>
        </svg>
        Copy schema to clipboard
      </button>
    </div>

    <!-- Snap Library — prominent, before support -->
    <div class="library-row">
      <button class="library-btn" id="btnLibrary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        Snap Library
        <span class="library-badge">
          <svg width="9" height="11" viewBox="0 0 24 30" fill="none">
            <path d="M12 0C12 0 1 14 1 20a11 11 0 0022 0C23 14 12 0 12 0z" fill="url(#popdrop)"/>
            <defs>
              <linearGradient id="popdrop" x1="0" y1="0" x2="24" y2="30" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#c084fc"/>
                <stop offset="55%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
          Pro
        </span>
      </button>
    </div>

    <div class="support-wrap">
      <div class="support-row">
        <a class="support-btn support-coffee" href="https://buymeacoffee.com/tudorprojects" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h12l-1.5 8H5.5L4 7z"/>
            <path d="M16 7c1.5 0 2.5.8 2.5 2s-1 2-2.5 2"/>
            <path d="M7 4c0-1.1.9-2 2-2s2 .9 2 2"/>
          </svg>
          Buy me a coffee
        </a>
        <a class="support-btn support-share" href="https://chromewebstore.google.com/detail/uidrop/gkeiedoojhdmlaimiookeaoppgfpemij" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="15" cy="4" r="2"/>
            <circle cx="5" cy="10" r="2"/>
            <circle cx="15" cy="16" r="2"/>
            <path d="M7 9l6-3.5M7 11l6 3.5"/>
          </svg>
          Share with a friend
        </a>
      </div>
    </div>

    <div class="footer">
      <span class="footer-mark">UIDrop</span>
    </div>

    </div>

  </div>

  <script src="ExtPay.js"></script>
  <script src="popup.js"></script>

</body>
</html>
