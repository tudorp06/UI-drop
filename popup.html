<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UIDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=author@700,800&f[]=switzer@400,500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="popup">

    <div class="setup-view hidden" id="setupView"></div>

    <div class="main-view" id="mainView">

    <div class="header">
      <div class="logo-wrap">
        <img src="icons/icon128.png" class="brand-logo" alt="UIDrop" />
      </div>

      <div class="wordmark">UI<span>Drop</span></div>

      <div class="header-badge hidden" id="statusBadge">
        <span class="badge-text"></span>
      </div>
    </div>

    <div class="screenshot" id="screenshotArea">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <span>snap to capture</span>
    </div>

    <p class="drag-hint hidden" id="dragHint">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11V4a1 1 0 011-1h0a1 1 0 011 1v7"/>
        <path d="M11 11V2a1 1 0 011-1h0a1 1 0 011 1v9"/>
        <path d="M13 11V3a1 1 0 011-1h0a1 1 0 011 1v8"/>
        <path d="M15 11V5a1 1 0 011-1h0a1 1 0 011 1v9.5a6 6 0 01-6 6h-2a6 6 0 01-5.196-3l-2-3.464A1 1 0 012 13a2 2 0 012-2h2"/>
      </svg>
      Drag the screenshot above into Claude, Cursor, or any AI chat
    </p>

    <button class="snap-btn" id="snapBtn">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="4" width="14" height="13" rx="2" stroke="white" stroke-width="1.6"/>
        <path d="M7 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="7.5" cy="11" r="1.4" fill="white"/>
        <circle cx="10"  cy="11" r="1.4" fill="white" opacity="0.7"/>
        <circle cx="12.5" cy="11" r="1.4" fill="white" opacity="0.4"/>
      </svg>
      Snap this page
    </button>

    <div class="schema hidden" id="schemaBox">
      <div class="schema-header">
        <span class="schema-label">Design schema</span>
        <span class="schema-site" id="schemaSite"></span>
      </div>

      <div class="schema-body" id="schemaBody"></div>

      <hr class="schema-divider"/>

      <p class="schema-summary" id="schemaSummary"></p>
    </div>

    <div class="send-label">Send to</div>
    <div class="send-row">

      <button class="send-btn btn-claude" id="btnClaude">
        <div class="btn-icon-wrap">
          <img src="icons/claude-logo-64.png" alt="Claude" class="btn-logo" />
        </div>
        Claude
      </button>

      <button class="send-btn btn-cursor" id="btnCursor">
        <div class="btn-icon-wrap btn-icon-dark">
          <img src="icons/cursor-logo-64.png" alt="Cursor" class="btn-logo" />
        </div>
        Cursor
      </button>

      <button class="send-btn btn-codex" id="btnChatGPT">
        <div class="btn-icon-wrap btn-icon-white">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.503 0H4.496A4.496 4.496 0 000 4.496v15.007A4.496 4.496 0 004.496 24h15.007A4.496 4.496 0 0024 19.503V4.496A4.496 4.496 0 0019.503 0z" fill="#fff"/>
            <path d="M9.064 3.344a4.578 4.578 0 012.285-.312c1 .115 1.891.54 2.673 1.275.01.01.024.017.037.021a.09.09 0 00.043 0 4.55 4.55 0 013.046.275l.047.022.116.057a4.581 4.581 0 012.188 2.399c.209.51.313 1.041.315 1.595a4.24 4.24 0 01-.134 1.223.123.123 0 00.03.115c.594.607.988 1.33 1.183 2.17.289 1.425-.007 2.71-.887 3.854l-.136.166a4.548 4.548 0 01-2.201 1.388.123.123 0 00-.081.076c-.191.551-.383 1.023-.74 1.494-.9 1.187-2.222 1.846-3.711 1.838-1.187-.006-2.239-.44-3.157-1.302a.107.107 0 00-.105-.024c-.388.125-.78.143-1.204.138a4.441 4.441 0 01-1.945-.466 4.544 4.544 0 01-1.61-1.335c-.152-.202-.303-.392-.414-.617a5.81 5.81 0 01-.37-.961 4.582 4.582 0 01-.014-2.298.124.124 0 00.006-.056.085.085 0 00-.027-.048 4.467 4.467 0 01-1.034-1.651 3.896 3.896 0 01-.251-1.192 5.189 5.189 0 01.141-1.6c.337-1.112.982-1.985 1.933-2.618.212-.141.413-.251.601-.33.215-.089.43-.164.646-.227a.098.098 0 00.065-.066 4.51 4.51 0 01.829-1.615 4.535 4.535 0 011.837-1.388zm3.482 10.565a.637.637 0 000 1.272h3.636a.637.637 0 100-1.272h-3.636zM8.462 9.23a.637.637 0 00-1.106.631l1.272 2.224-1.266 2.136a.636.636 0 101.095.649l1.454-2.455a.636.636 0 00.005-.64L8.462 9.23z" fill="url(#codex-grad)"/>
            <defs>
              <linearGradient id="codex-grad" gradientUnits="userSpaceOnUse" x1="12" x2="12" y1="3" y2="21">
                <stop stop-color="#B1A7FF"/>
                <stop offset=".5" stop-color="#7A9DFF"/>
                <stop offset="1" stop-color="#3941FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        Codex
      </button>

    </div>

    <div class="copy-row">
      <button class="copy-btn" id="btnCopy">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="5" y="5" width="8" height="8" rx="1.5"/>
          <path d="M3 11V3h8"/>
        </svg>
        Copy schema to clipboard
      </button>
    </div>

    <div class="support-wrap">
      <div class="support-row">
        <a class="support-btn support-coffee" href="https://buymeacoffee.com/tudorprojects" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h12l-1.5 8H5.5L4 7z"/>
            <path d="M16 7c1.5 0 2.5.8 2.5 2s-1 2-2.5 2"/>
            <path d="M7 4c0-1.1.9-2 2-2s2 .9 2 2"/>
          </svg>
          Buy me a coffee
        </a>
        <a class="support-btn support-share" href="https://chromewebstore.google.com/detail/uidrop" target="_blank" rel="noopener">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="15" cy="4" r="2"/>
            <circle cx="5" cy="10" r="2"/>
            <circle cx="15" cy="16" r="2"/>
            <path d="M7 9l6-3.5M7 11l6 3.5"/>
          </svg>
          Share with a friend
        </a>
      </div>
    </div>

    <div class="footer">
      <span class="footer-mark">UIDrop</span>
    </div>

    </div>

  </div>

  <script src="popup.js"></script>

</body>
</html>
