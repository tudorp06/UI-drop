<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bricolage Grotesque', sans-serif;
    overflow: hidden;
  }

  /* subtle radial glow behind logo */
  .glow {
    position: absolute;
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(120,80,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  .lockup {
    position: relative;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .logo {
    width: 110px;
    height: 110px;
    object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(255,120,40,0.22));
  }

  .wordmark {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -3px;
    color: #ffffff;
    line-height: 1;
  }

  .wordmark span {
    background: linear-gradient(135deg, #ff7c28 0%, #c94fff 60%, #4f8fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="lockup">
    <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png" alt="UIDrop"/>
    <div class="wordmark">UI<span>Drop</span></div>
  </div>
</body>
</html>
