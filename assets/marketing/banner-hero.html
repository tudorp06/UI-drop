<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #080b12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Bricolage Grotesque', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* background grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* top-left glow */
  .glow-a {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,80,255,0.13) 0%, transparent 65%);
    top: -200px; left: -150px;
    border-radius: 50%;
  }

  /* bottom-right glow */
  .glow-b {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(60,120,255,0.12) 0%, transparent 65%);
    bottom: -200px; right: -100px;
    border-radius: 50%;
  }

  .content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .lockup {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 6px 24px rgba(255,120,40,0.28));
  }

  .wordmark {
    font-size: 62px;
    font-weight: 800;
    letter-spacing: -2.5px;
    color: #fff;
    line-height: 1;
  }

  .wordmark span {
    background: linear-gradient(135deg, #ff7c28 0%, #c94fff 55%, #4f8fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: -0.3px;
    text-align: center;
    line-height: 1.5;
  }

  .tagline strong {
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  .pill {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.32);
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-a"></div>
  <div class="glow-b"></div>

  <div class="content">
    <div class="pill">Chrome Extension</div>
    <div class="lockup">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png" alt="UIDrop"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
    <div class="tagline">
      See a site you love. Read its <strong>design system.</strong> Build from it.
    </div>
  </div>
</body>
</html>
