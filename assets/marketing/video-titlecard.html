<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    background: #0b0d14;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 52px;
  }

  /* same subtle glow from screenshot — bottom right purple, faint */
  .glow-br {
    position: absolute;
    width: 900px; height: 700px;
    background: radial-gradient(ellipse, rgba(110,50,200,0.18) 0%, transparent 65%);
    bottom: -280px; right: -180px;
    border-radius: 50%;
    pointer-events: none;
  }
  /* very faint top-left */
  .glow-tl {
    position: absolute;
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, rgba(80,40,160,0.1) 0%, transparent 65%);
    top: -200px; left: -150px;
    border-radius: 50%;
    pointer-events: none;
  }

  /* lockup: logo + wordmark */
  .lockup {
    position: relative;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .logo {
    width: 100px; height: 100px;
    object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(200,100,30,0.3));
  }

  .wordmark {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -4px;
    line-height: 1;
    color: #ffffff;
  }

  /* match the pink→purple from the screenshot exactly */
  .wordmark span {
    background: linear-gradient(135deg, #ff6ec7 0%, #a855f7 60%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* subtitle */
  .subtitle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .subtitle-line {
    width: 48px;
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .subtitle-text {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="glow-br"></div>
  <div class="glow-tl"></div>

  <div class="lockup">
    <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png" alt="UIDrop"/>
    <div class="wordmark">UI<span>Drop</span></div>
  </div>

  <div class="subtitle">
    <div class="subtitle-line"></div>
    <div class="subtitle-text">How to use</div>
    <div class="subtitle-line"></div>
  </div>

</body>
</html>
