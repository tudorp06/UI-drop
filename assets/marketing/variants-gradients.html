<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    background: #060910;
    font-family: 'Bricolage Grotesque', sans-serif;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    gap: 60px;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    margin-bottom: 20px;
  }

  .lockup {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .logo {
    width: 80px; height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 6px 24px rgba(255,110,30,0.22));
  }

  .wordmark {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -3px;
    color: #fff;
    line-height: 1;
  }

  /* gradient variants */
  .g-original span {
    background: linear-gradient(135deg, #ff7c28 0%, #c94fff 55%, #4f8fff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .g-aurora span {
    background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 50%, #7b5fff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .g-fire span {
    background: linear-gradient(135deg, #ff0844 0%, #ffb199 50%, #ff6a00 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .g-gold span {
    background: linear-gradient(135deg, #f7971e 0%, #ffd200 50%, #fff7aa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .g-neon span {
    background: linear-gradient(135deg, #a8ff78 0%, #00e5ff 50%, #1de9b6 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .g-dusk span {
    background: linear-gradient(135deg, #fc466b 0%, #a855f7 50%, #3f5efb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
  }
</style>
</head>
<body>

  <div>
    <div class="label">Original — Fire & Electric</div>
    <div class="lockup g-original">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="label">Aurora — Mint to Violet</div>
    <div class="lockup g-aurora">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="label">Fire — Crimson to Ember</div>
    <div class="lockup g-fire">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="label">Gold — Amber to Champagne</div>
    <div class="lockup g-gold">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="label">Neon — Lime to Teal</div>
    <div class="lockup g-neon">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="label">Dusk — Rose to Indigo</div>
    <div class="lockup g-dusk">
      <img class="logo" src="D:/AI/UI copy chrome extension/icons/icon512.png"/>
      <div class="wordmark">UI<span>Drop</span></div>
    </div>
  </div>

</body>
</html>
